services:
    portfolio:
        build: ./minimalist-portfolio-template
        container_name: portfolio-site
        restart: unless-stopped
        ports:
            - "3636:80"

    tunnel:
        image: cloudflare/cloudflared:latest
        container_name: cloudflare-tunnel
        restart: unless-stopped
        command: tunnel run --token ${CLOUDFLARE_TOKEN}
        environment:
            - TUNNEL_TOKEN=${CLOUDFLARE_TOKEN}

    cctv-api:
        build:
            context: ./CCTV-Threat-Detection
            dockerfile: Dockerfile.backend
            args:
                USE_GPU: ${USE_GPU:-false}
        container_name: cctv-threat-api
        restart: unless-stopped
        expose:
            - "8000"
        volumes:
            - ./CCTV-Threat-Detection:/app
        environment:
            - PYTHONUNBUFFERED=1
        command: uvicorn api:app --host 0.0.0.0 --port 8000

    cctv-app:
        build:
            context: ./CCTV-Threat-Detection
            dockerfile: Dockerfile.frontend
        container_name: cctv-threat-streamlit-app
        restart: unless-stopped
        expose:
            - "8501"
        volumes:
            - ./CCTV-Threat-Detection:/app
        environment:
            - PYTHONUNBUFFERED=1
            - API_URL=http://cctv-api:8000/predict
            - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
            - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
        command: streamlit run app/streamlit-webcam.py --server.port 8501 --server.address 0.0.0.0
        depends_on:
            - cctv-api

    autoheal:
        image: willfarrell/autoheal:latest
        container_name: autoheal
        restart: unless-stopped
        environment:
            - AUTOHEAL_CONTAINER_LABEL=all
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro

    ira-backend:
        build:
            context: ./Intelligent-Research-Assistant
            dockerfile: backend/Dockerfile
        container_name: intelligent-research-backend
        restart: unless-stopped
        ports:
            - "8100:8000"
        env_file:
            - ./Intelligent-Research-Assistant/.env
        environment:
            - LM_STUDIO_URL=http://host.docker.internal:1234/v1/chat/completions
            - PYTHONUNBUFFERED=1

    ira-frontend:
        build:
            context: ./Intelligent-Research-Assistant/frontend
            dockerfile: Dockerfile
        container_name: intelligent-research-frontend
        restart: unless-stopped
        ports:
            - "7860:7860"
        environment:
            - API_URL=http://ira-backend:8000/query
        depends_on:
            - ira-backend
